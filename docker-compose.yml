version: '3.8'

services:
  resto-pos:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - pos-data:/home/pos/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pos-data:
